<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Happy 26th Birthday Wardatus Solekah">
  <title>Happy 26th Birthday!</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* The requested background color */
      background-color: #7ec1d4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      padding: 40px 20px;
    }

    /* THE MAIN COLLAGE CARD */
    .collage-card {
      background-color: #ffffff;
      max-width: 900px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 30px;
    }

    /* =========================================
       TOP LEFT: Flower, Palette, "26th's Birthday" 
       ========================================= */
    .top-left {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 20px;
    }

    /* Minimalist flower illustration */
    .flower-svg {
      width: 140px;
      height: auto;
      position: absolute;
      top: 0;
      left: 10px;
      opacity: 0.85;
    }

    /* Color Palette Dots */
    .color-palette {
      position: absolute;
      top: 10px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .color-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }
    .dot-1 { background-color: #7B4B36; } /* Brown */
    .dot-2 { background-color: #C88642; } /* Orange */
    .dot-3 { background-color: #BDB3A6; } /* Tan */
    .dot-4 { background-color: #AEC5CC; } /* Light Blue */

    .subtitle-text {
      font-family: 'Caveat', cursive;
      font-size: 38px;
      color: #333;
      line-height: 1.1;
      margin-left: 30px;
      margin-top: 180px; /* Pushes text below the flower */
    }

    /* =========================================
       TOP RIGHT: Two Vertical Photos
       ========================================= */
    .top-right {
      display: flex;
      gap: 15px;
      height: 300px;
    }

    .photo-frame-vert {
      flex: 1;
      height: 100%;
      background-color: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .photo-frame-vert img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder if image is missing */
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: #f7f7f7;
    }

    /* =========================================
       BOTTOM LEFT: One Horizontal Photo
       ========================================= */
    .bottom-left {
      height: 240px;
    }

    .photo-frame-horz {
      width: 100%;
      height: 100%;
      background-color: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .photo-frame-horz img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* =========================================
       BOTTOM RIGHT: Typography & Quote
       ========================================= */
    .bottom-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 20px;
    }

    .main-title {
      font-family: 'Caveat', cursive;
      font-size: 64px;
      color: #333;
      font-weight: 500;
      margin-bottom: 15px;
      line-height: 1;
    }

    .quote {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 25px;
      font-weight: 300;
    }

    .signature {
      font-family: 'Caveat', cursive;
      font-size: 32px;
      color: #333;
    }

    /* =========================================
       RESPONSIVE DESIGN (MOBILE)
       ========================================= */
    @media (max-width: 768px) {
      .collage-card {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        padding: 30px;
        gap: 20px;
      }
      
      .top-left {
        min-height: 220px;
      }

      .flower-svg {
        width: 120px;
      }

      .subtitle-text {
        margin-top: 140px;
        font-size: 32px;
      }

      .color-palette {
        right: 0;
      }

      .main-title {
        font-size: 52px;
        margin-top: 20px;
      }

      .bottom-right {
        padding-left: 0;
      }

      .photo-frame-horz {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <div class="collage-card">
    
    <!-- TOP LEFT QUADRANT -->
    <div class="top-left">
      <!-- Minimalist flower SVG -->
      <svg class="flower-svg" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M90 280 C 80 180, 100 100, 100 80" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Leaf left -->
        <path d="M93 210 C 60 200, 50 160, 95 180" stroke="#333" stroke-width="2.5" fill="#fff" stroke-linejoin="round"/>
        <!-- Leaf right -->
        <path d="M98 150 C 130 140, 140 100, 99 120" stroke="#333" stroke-width="2.5" fill="#fff" stroke-linejoin="round"/>
        
        <!-- Petals -->
        <path d="M100 80 C 60 70, 40 30, 80 40 C 90 42, 95 60, 100 80" stroke="#333" stroke-width="2.5" fill="#fff" stroke-linejoin="round"/>
        <path d="M100 80 C 80 40, 90 10, 110 20 C 115 30, 105 60, 100 80" stroke="#333" stroke-width="2.5" fill="#fff" stroke-linejoin="round"/>
        <path d="M100 80 C 110 40, 140 10, 140 30 C 135 50, 110 60, 100 80" stroke="#333" stroke-width="2.5" fill="#fff" stroke-linejoin="round"/>
        <path d="M100 80 C 130 60, 160 50, 140 80 C 120 90, 110 85, 100 80" stroke="#333" stroke-width="2.5" fill="#fff" stroke-linejoin="round"/>
        <path d="M100 80 C 70 85, 40 70, 70 90 C 80 95, 90 85, 100 80" stroke="#333" stroke-width="2.5" fill="#fff" stroke-linejoin="round"/>
        <!-- Flower Center -->
        <ellipse cx="100" cy="80" rx="10" ry="6" stroke="#333" stroke-width="2.5" fill="#fff"/>
        <path d="M93 80 L 107 80 M 96 77 L 104 77 M 96 83 L 104 83" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
      </svg>

      <!-- Color Palette -->
      <div class="color-palette">
        <div class="color-dot dot-1"></div>
        <div class="color-dot dot-2"></div>
        <div class="color-dot dot-3"></div>
        <div class="color-dot dot-4"></div>
      </div>

      <!-- Text -->
      <div class="subtitle-text">
        26th's<br>Birthday
      </div>
    </div>

    <!-- TOP RIGHT QUADRANT -->
    <div class="top-right">
      <div class="photo-frame-vert">
        <div class="placeholder">Foto 1</div>
        <img src="foto1.jpg" alt="Memory 1" onerror="this.style.display='none'">
      </div>
      <div class="photo-frame-vert">
        <div class="placeholder">Foto 2</div>
        <img src="foto2.jpg" alt="Memory 2" onerror="this.style.display='none'">
      </div>
    </div>

    <!-- BOTTOM LEFT QUADRANT -->
    <div class="bottom-left">
      <div class="photo-frame-horz">
        <div class="placeholder">Foto 3</div>
        <img src="foto3.jpg" alt="Memory 3" onerror="this.style.display='none'">
      </div>
    </div>

    <!-- BOTTOM RIGHT QUADRANT -->
    <div class="bottom-right">
      <h1 class="main-title">Happy Birthday</h1>
      <p class="quote">
        Count your life by smiles, not tears.<br>
        Count your age by friends, not years.<br>
        Happy Birthday!
      </p>
      <div class="signature">- Wardatus Solekah</div>
    </div>

  </div>

</body>
</html>
